version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: inventory_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: inventory_app
    depends_on:
      - mongo
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-inventory_db}
      # IMPORTANT: To display Tkinter on the host, you need to forward X11. 
      # Example for Linux/Mac:
      - DISPLAY=${DISPLAY}
    volumes:
      # Mount X11 socket to allow GUI forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  mongo_data:
